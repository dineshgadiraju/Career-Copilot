services:
  postgres:
    image: postgres:17
    container_name: career-copilot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: careercopilot
    ports:
      - "5432:5432"
    volumes:
      - career_copilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d careercopilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: career-copilot-redis
    ports:
      - "6379:6379"

  ml-service:
    build: ./ml-service
    container_name: career-copilot-ml
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    container_name: career-copilot-backend
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
      redis:
        condition: service_started
    environment:
      PORT: 8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/careercopilot?sslmode=disable
      ML_SERVICE_URL: http://ml-service:8000
      JWT_SECRET: local-dev-secret
      REDIS_ADDR: redis:6379
    ports:
      - "8081:8081"

  frontend:
    build: ./frontend
    container_name: career-copilot-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081
    ports:
      - "3000:3000"

volumes:
  career_copilot_pgdata: